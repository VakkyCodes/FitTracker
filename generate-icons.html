<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h1>Icon Generator - Right-click each icon and "Save Image As"</h1>
<p>Save them to the <code>icons/</code> folder with the filename shown.</p>
<div id="icons"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#0096c7');
    gradient.addColorStop(1, '#00b4d8');

    // Rounded rect background
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Shoe/footstep icon
    ctx.fillStyle = 'white';
    ctx.font = `bold ${size * 0.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👟', size / 2, size / 2);

    // FT text below
    ctx.font = `bold ${size * 0.14}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText('FitTracker', size / 2, size * 0.82);

    const container = document.createElement('div');
    container.style.cssText = 'display:inline-block;margin:20px;text-align:center;';
    const label = document.createElement('p');
    label.textContent = `icon-${size}.png (${size}x${size})`;
    label.style.fontWeight = 'bold';
    container.appendChild(label);
    container.appendChild(canvas);

    // Also create download link
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.textContent = `Download icon-${size}.png`;
    link.style.display = 'block';
    container.appendChild(link);

    document.getElementById('icons').appendChild(container);
});
</script>
</body>
</html>
