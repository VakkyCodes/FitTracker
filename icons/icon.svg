<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0096c7"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Walking figure -->
  <g transform="translate(96,80)" fill="white">
    <!-- Head -->
    <circle cx="0" cy="-35" r="12"/>
    <!-- Body -->
    <line x1="0" y1="-23" x2="0" y2="10" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Arms -->
    <line x1="-18" y1="-5" x2="18" y2="-15" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="0" y1="10" x2="-15" y2="38" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="0" y1="10" x2="18" y2="35" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Steps dots -->
  <circle cx="45" cy="140" r="4" fill="rgba(255,255,255,0.5)"/>
  <circle cx="60" cy="145" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="75" cy="140" r="4" fill="rgba(255,255,255,0.7)"/>
  <!-- Text -->
  <text x="96" y="172" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-weight="bold" font-size="16" opacity="0.9">FitTracker</text>
</svg>
